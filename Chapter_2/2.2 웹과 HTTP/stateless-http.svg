<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-label="HTTP stateless protocol diagram">
  <rect width="900" height="300" fill="#f8fafc"/>
  <rect x="70" y="95" width="180" height="110" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="160" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Client</text>
  <text x="160" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e3a8a">GET /index.html</text>
  <text x="160" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e3a8a">몇 초 뒤 다시 요청</text>

  <rect x="650" y="95" width="180" height="110" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="740" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#166534">Server</text>
  <text x="740" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#166534">클라이언트 상태 저장 안 함</text>
  <text x="740" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#166534">매 요청을 독립적으로 처리</text>

  <line x1="250" y1="120" x2="650" y2="120" stroke="#0f172a" stroke-width="3"/>
  <polygon points="650,120 638,114 638,126" fill="#0f172a"/>
  <text x="450" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Request 1: GET /index.html</text>

  <line x1="650" y1="155" x2="250" y2="155" stroke="#0f172a" stroke-width="3"/>
  <polygon points="250,155 262,149 262,161" fill="#0f172a"/>
  <text x="450" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Response 1: 200 OK</text>

  <line x1="250" y1="190" x2="650" y2="190" stroke="#0f172a" stroke-width="3" stroke-dasharray="10 8"/>
  <polygon points="650,190 638,184 638,196" fill="#0f172a"/>
  <text x="450" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Request 2: 같은 객체를 다시 요청</text>

  <line x1="650" y1="225" x2="250" y2="225" stroke="#0f172a" stroke-width="3" stroke-dasharray="10 8"/>
  <polygon points="250,225 262,219 262,231" fill="#0f172a"/>
  <text x="450" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Response 2: 이전 요청을 기억하지 않고 다시 응답</text>

  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">HTTP is Stateless</text>
  <text x="450" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">서버는 클라이언트의 이전 요청 상태를 저장하지 않는다.</text>
</svg>
